<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFL AI Chatbot</title>
  <link rel="stylesheet" href="public/styles.css">
</head>
<body>
  <div id="chat-container">
    <header>
      <h1>NFL AI Chatbot</h1>
    </header>
    <main id="chat-window">
      <div id="messages"></div>
    </main>
    <footer>
      <input type="text" id="user-input" placeholder="Ask me anything about the NFL...">
      <button id="send-btn">Send</button>
    </footer>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
